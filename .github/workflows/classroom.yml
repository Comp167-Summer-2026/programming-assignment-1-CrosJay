name: Autograding Tests
'on':
  - push
  - repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Temperature Converter Test
        id: temperature-converter-test
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: Temperature Converter Test
          setup-command: curl -O https://raw.githubusercontent.com/dinkinsimani22-cloud/autotest-test-assignment/main/test/TemperatureTest.java
            && javac -d . src/TemperatureConverter.java TemperatureTest.java
          command: java TemperatureTest
          timeout: 10
          max-score: 100
      - name: Autograding Reporter
        uses: classroom-resources/autograding-grading-reporter@v1
        env:
          TEMPERATURE-CONVERTER-TEST_RESULTS: "${{steps.temperature-converter-test.outputs.result}}"
        with:
          runners: temperature-converter-test